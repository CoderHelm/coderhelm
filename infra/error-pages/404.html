<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found — Coderhelm</title>
  <meta name="description" content="The page you're looking for doesn't exist or has been moved.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="Page Not Found — Coderhelm">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Coderhelm">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;overflow:hidden}
    .container{text-align:center;max-width:480px;position:relative;z-index:10}
    .code{font-size:8rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    h1{font-size:1.5rem;margin:1rem 0 .5rem;color:#f0f0f5}
    p{color:#9090a0;line-height:1.6;margin-bottom:2rem}
    a{display:inline-block;padding:.75rem 2rem;background:#6366f1;color:#fff;text-decoration:none;border-radius:.5rem;font-weight:600;transition:background .2s}
    a:hover{background:#4f46e5}
    canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;image-rendering:pixelated}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Home</a>
  </div>
  <script>
    const C=document.getElementById('c'),X=C.getContext('2d');
    let W,H;
    function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
    resize();addEventListener('resize',resize);

    // Pixel-art 8x8 walking character
    const sprites={
      down:[
        '..0110..','.011110.','.1EFFE1.','.1FEFF1.',
        '..1111..','.2BBBB2.','.2B22B2.','..3..3..',
      ],
      up:[
        '..0110..','.011110.','.111111.','.111111.',
        '..1111..','.2BBBB2.','.2B22B2.','..3..3..',
      ],
      left:[
        '..0110..','.011110.','.1EFF11.','.1FEF11.',
        '..1111..','.2BBBB2.','.2B22B2.','.3...3..',
      ],
      right:[
        '..0110..','.011110.','.11FFE1.','.11FEF1.',
        '..1111..','.2BBBB2.','.2B22B2.','..3...3.',
      ],
    };

    function drawSprite(x,y,frame,pal,dir){
      const s=3,sp=sprites[dir]||sprites.down;
      const colors={'0':pal[0],'1':pal[1],'E':'#fff','F':'#222','B':pal[2],'2':pal[2],'3':pal[3]};
      for(let r=0;r<8;r++){
        for(let c=0;c<8;c++){
          const ch=sp[r][c];
          if(ch==='.')continue;
          let ox=0;
          if(r>=6&&frame%2===1){ox=c<4?s:-s}
          X.fillStyle=colors[ch]||'#f0f';
          X.fillRect(x+c*s+ox,y+r*s,s,s);
        }
      }
    }

    const palettes=[
      ['#3a2a4a','#c0a0e0','#6366f1','#3a3a4a'], // indigo
      ['#2a3a5a','#a0c0e8','#4888cc','#3a3a3a'], // blue
      ['#4a3028','#e8c0a0','#cc6644','#4a3a2a'], // red
    ];
    const dirs=['up','down','left','right'];

    const npcs=[];
    for(let i=0;i<3;i++){
      npcs.push({
        x:Math.random()*W,
        y:Math.random()*H,
        dir:dirs[Math.floor(Math.random()*4)],
        speed:.4+Math.random()*.3,
        timer:0,
        changeDirAt:120+Math.floor(Math.random()*200),
        frame:0,
        pal:palettes[i],
      });
    }

    function update(){
      for(const n of npcs){
        n.timer++;
        if(n.timer>=n.changeDirAt){
          n.dir=dirs[Math.floor(Math.random()*4)];
          n.timer=0;
          n.changeDirAt=120+Math.floor(Math.random()*200);
        }
        const dx=n.dir==='left'?-n.speed:n.dir==='right'?n.speed:0;
        const dy=n.dir==='up'?-n.speed:n.dir==='down'?n.speed:0;
        n.x+=dx;n.y+=dy;
        // wrap around screen
        if(n.x<-30)n.x=W+20;if(n.x>W+30)n.x=-20;
        if(n.y<-30)n.y=H+20;if(n.y>H+30)n.y=-20;
        n.frame++;
      }
    }

    function draw(){
      X.clearRect(0,0,W,H);
      for(const n of npcs){
        drawSprite(n.x,n.y,Math.floor(n.frame/10),n.pal,n.dir);
      }
    }

    function loop(){update();draw();requestAnimationFrame(loop)}
    loop();
  </script>
</body>
</html>
